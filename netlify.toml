[build]
  command = "npm ci && npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers are set in middleware.ts (single source of truth)
# This ensures nonce-based CSP works correctly with dynamic generation
# Only cache-control headers remain here for static assets

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Redirect Netlify subdomain to primary domain (SEO canonicalization)
# The 301 fires at the CDN edge before any content is served,
# which tells search engines the canonical URL is the primary domain.
[[redirects]]
  from = "https://be-projects.netlify.app/*"
  to = "https://www.beprojectsolutions.com/:splat"
  status = 301
  force = true
